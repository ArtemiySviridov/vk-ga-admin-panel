services:
  admin-panel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /
    image: vk-ga-admin-panel:latest
    container_name: vk-ga-admin-panel
    restart: unless-stopped
    ports:
      - "${ADMIN_PANEL_PORT:-8080}:80"
    environment:
      API_PROXY_PASS: "${API_PROXY_PASS:-https://vk.wonderrfau1t.site}"
